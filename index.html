  }

  99% {

  }

    <script type="text/javascript">// -> script.js
const DEBUG_MODE = false;
const FOCUS_ENABLED = true;

let NOSYNC = "nosync";
let MANUAL = "manual";
let IN_PROGRESS = "in_progress";

const browser = chrome;
const lang = ["ru"];
const themes = ["auto","dark","light"];
const defaultColor = "#0000CD"; // Any 16x color except black and white (not #000000, not #FFFFFF) // Любой шестнадцатиричный цвет, кроме чисто чёрного и чисто белого
const showKey = "show";
const hideKey = "hide";
const customKeys = [showKey,hideKey];

let updateRanges = function () {
	for (let elem of document.querySelectorAll(`input[type="range"]`)) elem.onchange();
};

let rangeOnChange = function (range) {
	let color = window.getComputedStyle(range).getPropertyValue('--accent-color');
	let percent = range.value / range.max * 100;
	range.style = `background: linear-gradient(to right, ${color} ${percent}%, transparent ${percent}%);`
};

let addRange = function (range) {
	range.addEventListener("change", function (event) {
		rangeOnChange(range);
	});

	range.addEventListener("input", function (event) {
		rangeOnChange(range);
	});

	range.addEventListener("mousedown", function () {
		rangeOnChange(range);
	});

	range.addEventListener("click", function () {
		rangeOnChange(range);
	});

	range.addEventListener("mouseup", function () {
		rangeOnChange(range);
	});
};

let checkProperty = function (dictionary,key,mustBeFunction=undefined) {
	if (dictionary && key && dictionary.hasOwnProperty(key)) {
		let value = dictionary[key];
		switch (mustBeFunction) {
			case true:
				return typeof(value) == "function";
			case false:
				return typeof(value) != "function";
			default:
				return true;
		}
	} else return false;
};

// Add style to page // Добавить стили на страницу
let addStylesheet = function (stylesheet) {
	if (stylesheet) {
		let style = document.createElement("style");
		style.type = "text/css";
		style.innerHTML = stylesheet;
		document.head.append(style);
		return style;
	}
};

/* Global functions // Используемые функции */

// Values of parameters without DOM elements // Значения параметров без DOM-элементов
let keys = {
};
let values = new FormData();

// Values of parameters settings[ID] = VALUE // Сохранённые значения параметров
let settings = {
	"radio": [],
};

// Onclick functions for buttons functions[ID] = CALLABLE // Функции обработки нажатий кнопок внутри параметров (если параметр - кнопка)
let functions = {
};

// 
let templates = {
    trigger: {
        next_id: 0
    },
    schedule: {
        next_id: 0
    }
};

let createButtons = [];
let removeButtons = [];

let addTemplate = function (id, parentElement, parameterElement) {
	templates[id] = {
		"parent": parentElement,
		"template": parameterElement,
		"next_id": 1
	}
};

let getNumberId = function (id) {
	if (templates.hasOwnProperty(id)) {
		templates[id].next_id++;
		return templates[id].next_id
	}
};

let removeCreated = function (elem) {
	elem.remove();
};

let createFromTemplate = function (id) {
	let template = document.querySelector(`[data-template-element="${id}"].template`);
	if (template) {
		let parentElement = document.querySelector(`[data-template-container="${id}"]`);
		let parameterElement = template;
		let number_id = getNumberId(id);

		let clone = parameterElement.cloneNode(true);

		for (let elem of clone.querySelectorAll("*")) {
			for (let key of ["id", "for"]) {
				let value = elem.getAttribute(key);
				if (value) elem.setAttribute(key, `${value}_${number_id}`);
			}

			for (let key of ["id"]) {
				let value = elem.dataset[key];
				if (value) elem.dataset[key] = `${value}_${number_id}`;
			}

			makeListeners(elem);
		}

		for (let elem of clone.querySelectorAll("[data-lang-text]")) {
			let langText = elem.dataset.langText;
			addLangElement(langText, elem);
			let dictionary = getLangPhrase(langText);

            let text = langText;
            if (dictionary) text = dictionary[lang[0]]; // ["textContent"] =>

			// .attrName <=
            // if (attrName == "tipText") element.dataset.tipText = text || id;
            // else element[attrName] = text || id;
		}

		let removeButton = clone.querySelector(".remove");
		if (removeButton) {
			removeButton.addEventListener("click", function () {
				removeCreated(clone);
				updateTrigger();
			});
		}

		if (parentElement.children.length > 0) {
			parentElement.insertBefore(clone, parentElement.children[parentElement.children.length - 1]);
		} else {
			parentElement.append(clone);
		}

        updateLang();
		updateTrigger();

        clone.classList.remove("template");
		return clone;
	}
};

let updateTrigger = function () {
	let header = document.querySelector(`[data-id="trigger_header"]`);
	let container = document.querySelector(`[data-id="trigger"] .content`);

	if (header && container) {
		let content = container.querySelector(`[name="trigger_sheet"]`);
		if (content) header.classList.remove("hide");
		else header.classList.add("hide");
	}
};

// parameter == button => button.onclick = () => functions[id]();
let getOnclick = function (id) {
	if (id in functions) return functions[id];
	else return function () {};
};

let makeListeners = function (elem) {
	let id = elem.id;
	
	switch (elem.type) {
		// case "submit":
		case "button":
			elem.classList.add("listener");
			if (elem.dataset.create) {
				elem.addEventListener("click", function () {
                    if (event) event.preventDefault();
					createFromTemplate(elem.dataset.create);
				});
			} else {
				elem.addEventListener("click", function () {
					if (event) event.preventDefault();
					getOnclick(id)();
				});
			}
			break;
		case "range":
			elem.classList.add("listener");
			addRange(elem);
			break;
		case "color":
			elem.classList.add("listener");
			elem.addEventListener("change", function (event) {
				// css: var(--input.id) << input.value
				document.body.style.setProperty(`--${elem.id}`, elem.value);
				save();
	
				// paramenterBlock.background <= input[type="color"].value
				// if (show) {
				let parameterBlock = getBlock(elem.parentElement);
				parameterBlock.style.backgroundColor = elem.value;
				getSpoiler(elem.parentElement).addEventListener("change", function () {
					parameterBlock.style.backgroundColor = "";
				});
			});
			break;
		case "select-one":
		case "select":
			elem.classList.add("listener");
			
			let selectOnchange = function (event) {
				save();

				let customKey = "schedule_unit_";
				if (id.startsWith(customKey)) {
					let parentElement = elem.parentElement.parentElement.parentElement;
					let scheduleNumber = parentElement.querySelector(`input[name="schedule_number"]`);
					let scheduleTime = parentElement.querySelector(`input[name="schedule_time"]`);
					let scheduleAt = parentElement.querySelector(`[data-lang-text="schedule_time"]`);
					let scheduleTimeContainer = scheduleTime.parentElement.parentElement;
					
					let flag = elem.value == "days";

					for (let container of [scheduleTimeContainer, scheduleAt]) {
						if (container) {
							if (flag) container.classList.remove("hide");
							else container.classList.add("hide");
						}
					}

					if (scheduleTime) scheduleTime.required = flag;

					if (scheduleNumber) {
						if (elem.value == "seconds") {
							scheduleNumber.min = 60;
							scheduleNumber.step = 1;
						} else if (elem.value == "days") {
							scheduleNumber.min = 1;
							scheduleNumber.step = 1;
						} else {
							scheduleNumber.min = 0.001;
							scheduleNumber.step = "any";
						}
					}
				}
			};

			elem.addEventListener("change", selectOnchange);

			// onchange if value="custom" => show .custom_parent
			selectOnchange();
			break;
		case "radio":
			elem.classList.add("listener");
			let parentElement = elem.parentElement;
			if (elem.classList.contains("radio_option")) {
				// => optionId, save
				elem.addEventListener("change", function (event) {
					let optionId = elem.dataset.optionId;
					parentElement.value = optionId;
					// elem.value = optionId;
					radioChange(id);
					save();
				});
			} else if (parentElement.classList.contains("radio_container")) {
				elem.addEventListener("change", function (event) {
					let parent = parentElement.parentElement.querySelector(".input");
					if (parent && elem.checked) {
						parent.value = id;
						if (parent.onchange) parent.onchange();
					}

					radioChange(id);
					save();
				});
			} else {
				let optionOnchange = function (event) {
					radioChange(id);
					save();
				};
				elem.addEventListener("change", optionOnchange);
				optionOnchange(null);
			}
			break;
	}

	if (id == "lang") {
		elem.classList.add("listener");
		elem.addEventListener("change", function (event) {
			changeLang(elem.value);
		});
		elem.onchange();
	} else if (id == "theme") {
		elem.classList.add("listener");
		elem.classList.add("theme");
		elem.addEventListener("change", function (event) {
			setTheme(elem.value);
		});
		elem.onchange();
	} else if (id == "dev") {
		elem.classList.add("listener");
		elem.classList.add("dev");
		elem.addEventListener("change", function (event) {
			if (elem.checked) enableDev();
			else disableDev();
		});
		elem.checked = checkDevEnabled();
	}

	if (elem.classList.contains("theme")) {
		elem.classList.add("listener");
		// themeButton.onclick = () => {toggleTheme()}
		elem.onclick = function () {
			try { event.preventDefault(); } catch {}
			toggleTheme();
		};
	}

	if (elem.classList.contains("tip")) {

async function hash(input) {
    // Преобразуем входную строку в массив байтов (Uint8Array)
    const encoder = new TextEncoder();
    const data = encoder.encode(input);

    // Генерируем хэш с использованием SHA-256
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    // Преобразуем хэш из ArrayBuffer в строку в формате hex
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(byte => byte.toString(16).padStart(2, "0")).join("");

    return hashHex;
}

    while (pos !== -1) {

    }

    return count;
};

                    setMail(h, error);
                };
                hash(key).then(setMailHash);
            }
            addInvalid([], error, mailAddressField);
            addInvalid([], error, mailPasswordField);

            let mailStatus = document.querySelector(`#mail`);
            if (mailStatus) {
                setStatus(mailStatus, "failed");
                mailStatus.dataset.error = error;
            }

            let settingsSubmit = document.querySelector("#settings_submit");
            if (settingsSubmit && connectionLost) {
                settingsSubmit.classList.remove("notext");
                settingsSubmit.classList.remove("status");
                settingsSubmit.classList.remove("loader");
                settingsSubmit.classList.remove("failed");
                settingsSubmit.classList.remove("checked");
                settingsSubmit.disabled = false;
                mailServerField.value = "lost_connection";
            }
        }
        // console.log("=> afterCheck", afterCheck);
        afterCheck();
    };

    let failed = false;

    if (mailAddress.length < 6 || !mailAddress.includes("@")) {
        // console.log("  address_incorrect!");
        processResult({
            success: false,
            error: getKeyPhrase("address_incorrect")
        });
        failed = true;
    } else removeInvalid(mailAddressField);

    if (mailPassword.length < 15) {
        // console.log("  password_wrong!");
        processResult({
            success: false,
            error: getKeyPhrase("password_wrong")
        });
        failed = true;
    } else removeInvalid(mailPasswordField);

    if (failed) return;

    if (parent) {
        status = parent.querySelector(".status");
        if (status) setStatus(status, "loader");
    }

    async function processSaved(key) {
        let result = getMail(key);
        // console.log("  saved:", mailAddress, mailPassword, `result='${result}'`);

        if (result == " ") {
            // console.log("  skip check");
            // console.log("=> afterCheck", afterCheck);
            afterCheck();
            return;
        } else if (result && (result.hasOwnProperty("success") || result.hasOwnProperty("error"))) {
            processResult(result);
        } else {
            // console.log("  setMail processing=' '");
            setMail(key, " ");
            let index = checkMail({
                "id": mailServerField.id,
                "address": mailAddressField.value,
                "password": mailPasswordField.value
            });
            Data.mail_index = index;
    
            let processResultIndex = function (result) {
                if (Data.mail_index == index) processResult(result, index);
                else afterCheck();
            };
    
            wait(index, processResultIndex);
        }
    };
    hash(key).then(processSaved);
};

let checkTriggerSheet = function () {
    let triggerRequired = getKeyPhrase("trigger_required");
    let sheetRequired = getKeyPhrase("sheet_required");
    
    let triggerCreate = document.querySelector(`#trigger_create`);
    let createButton = document.querySelector(`[name="spreadsheet_create"]`);
    let triggerSheetField = document.querySelector(`.trigger:not(.template) [name="trigger_sheet"]`);
    let invalidSheetField = document.querySelector(`.trigger:not(.template) [name="trigger_sheet"]:invalid`);

    if (!triggerSheetField) {
        addInvalid([], triggerRequired, triggerCreate);
        addInvalid([], triggerRequired, createButton);
        return false;
    } else if (invalidSheetField && triggerSheetField == invalidSheetField) {
        removeInvalid(triggerCreate);
        addInvalid([], sheetRequired, createButton);
        addInvalid([], sheetRequired, invalidSheetField);
        return false;
    }
    removeInvalid(triggerCreate);
    removeInvalid(triggerSheetField);
    return true;
};

let updateTriggerHeader = function(triggerElement, triggerName) {
    let triggerTextField = triggerElement.querySelector(`[name="trigger_text"]`);
    let triggerHeader = triggerElement.querySelector(`label .text`);
    let triggerText = triggerTextField.value;
    let hoverText = triggerTextField.value || `Триггер ${triggerName}`;

    if (hoverText.length > 1000) {
        hoverText = hoverText.slice(0, 1000);
        hoverText = `"${hoverText}...`;
    }

    if (triggerText.length > 0) {
        if (triggerText.length > 35) {
            triggerText = triggerText.slice(0, 35);
            triggerName = `"${triggerText}...`;
        } else {
            triggerName = `"${triggerText}"`;
        }
    }

    triggerHeader.title = hoverText;
    triggerHeader.textContent = `Триггер ${triggerName}`;
};

let askOpenFilename = function () {
    let credentialsField = document.querySelector(`[name="spreadsheet_credentials"]`);
    let credentialsButton = document.querySelector(`[name="spreadsheet_askopenfilename"]`);
    
    if (!credentialsField) return;
    if (!credentialsButton) return;

    credentialsButton.disabled = true;

    let status = findStatusButton(credentialsButton);
    if (status) setStatus(status, "loader");

    let processResult = function (result) {
        credentialsButton.disabled = false;
        // console.log("credentials: ", result);
        if (result == null) {
            addInvalid([], getKeyPhrase("credentials_failed"), credentialsButton);
            credentialsField.value = "";
        } else if (result.success) {
            status.dataset.error = "";
            credentialsField.value = result.filename;
            credentialsButton.classList.remove("invalid");
        } else {
            addInvalid([], result.error, credentialsButton);
            credentialsField.value = "";
        }
        credentialsChanged();
    };
    
    let index = askOpen({});
    wait(index, processResult, Infinity);
};

let addInvalid = function (errors, message, field) {
    if (field) {
        field.classList.add("invalid");
        // console.log("invalid", field);

        let statusButton = findStatusButton(field);
        if (statusButton) {
            setStatus(statusButton, "failed");
            statusButton.dataset.error = message;
        } else field.dataset.error = message;

        let selector = ".spoiler:not(.invisible)";
        let parent = findParentWithChild(field, selector);
        if (parent) {
            let spoiler = parent.querySelector(selector);
            if (spoiler) spoiler.checked = true;
        }
    }

    errors.push([message, field]);
};

let addLoader = function (field) {
    let statusButton = findStatusButton(field);
    if (statusButton) {
        setStatus(statusButton, "loader");
    }
};

let removeInvalid = function (field) {
    if (field) {
        field.classList.remove("invalid");

        let statusButton = findStatusButton(field);
        if (statusButton) {
            setStatus(statusButton, "checked");
            statusButton.dataset.error = "";
        }
    }
};

        submit.classList.remove("status");
        submit.classList.remove("loader");
        submit.classList.remove("checked");
        submit.classList.remove("failed");
        submit.classList.remove("notext");
        submit.disabled = false;
    };

    for (let elem of form.querySelectorAll("input")) {
        if ((!elem.classList.contains("spoiler")) && (!elem.classList.contains("hidden"))) {
            elem.onchange = function () {
                valueChanged(elem);
            };

            elem.oninput = function () {
                valueChanged(elem);
            };
        }

    for (let elem of form.querySelectorAll("select")) {
        elem.onchange = function () {
            valueChanged(elem);
        };

let submitSettings = function (settingsForm) {
    // console.log("submit!");
    let settingsSubmit = settingsForm.querySelector("#settings_submit");
    let headerContent = settingsForm.querySelector(".content");
    let headerTip = settingsForm.querySelector(".tip");

    if (settingsSubmit) {
        settingsSubmit.disabled = true;
        settingsSubmit.classList.add("notext");
        settingsSubmit.classList.add("status");
        setStatus(settingsSubmit, "loader");
    }
    if (headerContent) headerContent.classList.add("hide");

    let mailChecking = false;
    let errors = [];

    let afterCheck = function () {
        let settingsForm = document.querySelector("form#settings");
        let settingsSubmit = settingsForm.querySelector("#settings_submit");

        let mailServerField = document.querySelector(`[name="mail_server"]`);
        let mailServer = mailServerField.value;

        let mailAddressField = settingsForm.querySelector(`[name="mail_address"]`);
        let mailPasswordField = settingsForm.querySelector(`[name="mail_password"]`);

        if (mailServer == "imap.mail.ru") {
            // console.log("watchdog => submit!");
            headerTip.classList.remove("error");
            headerContent.classList.remove("hide");
            headerTip.textContent = "Сохранение настроек...";
            submitSettings(settingsForm);
        } else if (mailServer == " ") {
            Data.mails = {};  // FIXME: Костыль
            // console.log("watchdog => lost_connection!");
            settingsSubmit.disabled = false;
            settingsSubmit.classList.remove("notext");
            settingsSubmit.classList.remove("status");
            settingsSubmit.classList.remove("loader");
            settingsSubmit.classList.remove("failed");
            settingsSubmit.classList.remove("checked");

            let mailStatus = document.querySelector(`#mail`);
            if (mailStatus) {
                setStatus(mailStatus, "failed");
            }

            addInvalid(errors, getKeyPhrase("check_failed"), mailAddressField);
            addInvalid(errors, getKeyPhrase("check_failed"), mailPasswordField);
            showErrors(errors);
        } else if (mailServer) {                
            // console.log(watchdog => "error!");

            if (mailServer == "lost_connection") {
                // console.log("lost connection!");
                addInvalid(errors, getKeyPhrase("check_failed"), mailAddressField);
                mailServerField.value = "lost_connection";
            } else if (mailServer == getKeyPhrase("address_incorrect")) {
                // console.log("address incorrect!");
                addInvalid(errors, mailServer, mailAddressField);
            } else if (mailServer == getKeyPhrase("password_incorrect")) {
                // console.log("password incorrect!", mailPassword.length > 0);
                if (mailPassword.length > 0) addInvalid(errors, mailServer, mailPasswordField);
            } else {
                // console.log("other!");
                addInvalid(errors, mailServer, mailAddressField);
            }

            setStatus(settingsSubmit, "failed");
            showErrors(errors);
        } else {
            // console.log("wathdog => ????");
        }
    };

    let updateMail = function () {
        // console.log("watchdog, check");
        check(afterCheck);
        let mailServerField = settingsForm.querySelector(`[name="mail_server"]`);

        let interval = setInterval(() => {
            if (mailServerField) {
                if (mailServerField.value != " ") {
                    // console.log("watchdog => check");
                    clearInterval(interval);
                    headerContent.classList.add("hide");
                    check(afterCheck);
                }
            } else clearInterval(interval);
        }, 100);
    };

    let showErrors = function (errors) {
        let scrolled = false;
        if (headerTip) headerTip.innerHTML = "";

        let errorText = "";

        for (let error of errors) {
            if (!errorText.includes(error[0])) {
                let p = document.createElement("p");
                p.classList.add("text");
                p.textContent = error[0];
                if (headerTip) headerTip.append(p);

                if (errorText) errorText += "\n" + error[0];
                else errorText = error[0];
            }

            if (error[1] && !scrolled) {
                // error[1].scrollIntoView();
                scrolled = true;
            }
        }

        if (headerTip && errorText.trim()) headerTip.classList.add("error");
        if (headerContent && errorText.trim()) headerContent.classList.remove("hide");
        if (settingsSubmit && errorText.trim()) settingsSubmit.dataset.error = errorText;
    };

    let values = getValues(settingsForm);

    let mails = [];
    let allMails = settingsForm.querySelectorAll(".mail");
    for (let i = 0; i < allMails.length; i++) {
        let mailServerField = allMails[i].querySelector(`[name="mail_server"]`);
        let mailAddressField = allMails[i].querySelector(`[name="mail_address"]`);
        let mailPasswordField = allMails[i].querySelector(`[name="mail_password"]`);
        
        if (mailAddressField && mailPasswordField) {
            let mailServer = getValue(values, "mail_server", i);
            let mailAddress = getValue(values, "mail_address", i);
            let mailPassword = getValue(values, "mail_password", i);

            if (mailAddress.length < 6 || !mailAddress.includes("@")) {
                addInvalid(errors, getKeyPhrase("address_incorrect"), mailAddressField);
                mailAddress = "";
            } else removeInvalid(mailAddressField);

            if (!mailPassword) {
                addInvalid(errors, getKeyPhrase("password_wrong"), mailPasswordField);
            } else removeInvalid(mailPasswordField);

            // console.log(`mailServer='${mailServer}'`);
            if (mailServer == "imap.mail.ru") {
                // console.log("valid!");
                headerTip.classList.remove("error");
                headerContent.classList.remove("hide");
                headerTip.textContent = "Сохранение настроек...";
                removeInvalid(mailServerField);
                removeInvalid(mailAddressField);
                removeInvalid(mailPasswordField);
            } else if (mailServer == " ") {
                // console.log("loading!");
                headerTip.textContent = getKeyPhrase("check_processing");
                headerTip.classList.remove("error");
                headerContent.classList.remove("hide");
                mailChecking = true;
                mailServer = "";
                addLoader(mailServerField);
            } else if (mailServer) {                
                // console.log("error!");
                headerContent.classList.add("hide");
                
                if (mailServer == "lost_connection") {
                    // console.log("lost_connection!");
                    addInvalid(errors, getKeyPhrase("check_failed"), mailAddressField);
                    mailServerField.value = "lost_connection";
                } else if (mailServer == getKeyPhrase("address_incorrect")) {
                    // console.log("address_incorrect!");
                    addInvalid(errors, mailServer, mailAddressField);
                } else if (mailServer == getKeyPhrase("password_incorrect")) {
                    // console.log("password_incorrect!", mailPassword.length > 0);
                    if (mailPassword.length > 0) addInvalid(errors, mailServer, mailPasswordField);
                } else {
                    // console.log("other!");
                    addInvalid(errors, mailServer, mailAddressField);
                }

                mailServer = "";
            } else {
                // console.log("not server!");
                // headerContent.classList.add("hide");
                // headerTip.textContent = "Сохранение настроек";
                // headerTip.classList.remove("error");
                // headerContent.classList.remove("hide");
                // mailChecking = false;
                // mailServer = "";
                // addLoader(mailServerField);
            }

            // console.log("mailServer =>", !!mailServer);
            if (mailAddress && mailPassword && mailServer) {
                mails.push({
                    "mail_server": mailServer,
                    "mail_address": mailAddress,
                    "mail_password": mailPassword
                })
            }
        }
    }

    checkTriggerSheet();
    let triggers = [];
    let allTriggers = settingsForm.querySelectorAll(".trigger");

    let triggerCreate = document.querySelector(`#trigger_create`);

    if (allTriggers.length < 1) {
        addInvalid(errors, getKeyPhrase("trigger_required"), triggerCreate);
    } else removeInvalid(triggerCreate);

    let triggersSheets = {
        "counterparty": [],
        "other": []
    };
    let triggersData = [];

    for (let i = 0; i < allTriggers.length; i++) {
        let triggerPartField = allTriggers[i].querySelector(`[name="trigger_part"]`);
        let triggerTypeField = allTriggers[i].querySelector(`[name="trigger_type"]`);
        let triggerTextField = allTriggers[i].querySelector(`[name="trigger_text"]`);
        let triggerSheetField = allTriggers[i].querySelector(`[name="trigger_sheet"]`);
        let triggerColumnField = allTriggers[i].querySelector(`[name="trigger_column"]`);
        // let triggerValueField = allTriggers[i].querySelector(`[name="trigger_column_value"]`);
        
        if (triggerSheetField && triggerTextField) {
            // = getValue(values, "trigger_part", i);
            let triggerPart = triggerPartField.value;
            let triggerType = triggerTypeField.value;
            let triggerText = triggerTextField.value;
            let triggerSheet = triggerSheetField.value;
            let triggerColumn = triggerColumnField.value;
            // let triggerColumnValue = triggerValueField.value;

            if (!triggerParts.includes(triggerPart)) {
                addInvalid(errors, getKeyPhrase("part_wrong"), triggerPartField);
                triggerPart = "";
            } else removeInvalid(triggerPartField);

            if (!triggerTypes.includes(triggerType)) {
                addInvalid(errors, getKeyPhrase("type_wrong"), triggerTypeField);
                triggerType = "";
            } else removeInvalid(triggerTypeField);

            if (!triggerColumns.includes(triggerColumn)) {
                addInvalid(errors, getKeyPhrase("column_wrong"), triggerColumnField);
                triggerColumn = "";
            } else removeInvalid(triggerColumnField);

            if (!triggerText) addInvalid(errors, getKeyPhrase("text_required"), triggerTextField);
            else removeInvalid(triggerTextField);

            if (!triggerSheet) addInvalid(errors, getKeyPhrase("sheet_required"), triggerSheetField);
            else removeInvalid(triggerSheetField);
            
            // if ((!triggerColumnValue) && (triggerColumn == "date_in_exact")) addInvalid(errors, getKeyPhrase("value_required"), triggerValueField);
            // else removeInvalid(triggerValueField);

            if (triggerPart && triggerType && triggerText && triggerSheet && triggerColumn) {
                let key = "other";
                if (triggerColumn == "counterparty") key = "counterparty";
                triggersSheets[key].push(triggerSheet);
                triggersData.push([triggerColumn, triggerSheet, triggerSheetField]);
                
                triggers.push({
                    "trigger_part": triggerPart,
                    "trigger_type": triggerType,
                    "trigger_text": triggerText,
                    "trigger_sheet": triggerSheet,
                    "trigger_column": triggerColumn
                })
            }
        }
    }

    let invalidSheets = [];

    for (let triggerSheet of triggersSheets["counterparty"]) {
        if (triggerSheet.length > 0 && triggersSheets["other"].includes(triggerSheet)) {
            invalidSheets.push(triggerSheet);
        }
    }

    for (let triggerData of triggersData) {
        let triggerColumn = triggerData[0];
        let triggerSheet = triggerData[1];
        let triggerSheetField = triggerData[2];

        if (invalidSheets.includes(triggerSheet)) {
            addInvalid(errors, getKeyPhrase("counterparty_occupied"), triggerSheetField);
        }
    }

    let schedule = [];
    let allSchedule = settingsForm.querySelectorAll(".schedule");
    for (let i = 0; i < allSchedule.length; i++) {
        let scheduleNumberField = allSchedule[i].querySelector(`[name="schedule_number"]`);
        let scheduleUnitField = allSchedule[i].querySelector(`[name="schedule_unit"]`);
        let scheduleTimeField = allSchedule[i].querySelector(`[name="schedule_time"]`);
        
        if (scheduleNumberField && scheduleUnitField) {
            let scheduleNumber = scheduleNumberField.value; // getValue(values, "schedule_number", i);
            let scheduleUnit = scheduleUnitField.value; // getValue(values, "schedule_unit", i);
            let scheduleTime = scheduleTimeField.value; // getValue(values, "schedule_time", i);

            if (scheduleNumber < 0.1) {
                addInvalid(errors, getKeyPhrase("number_low"), scheduleNumberField);
                scheduleNumber = 0;
            } else if (scheduleNumber > 10000) {
                addInvalid(errors, getKeyPhrase("number_large"), scheduleNumberField);
                scheduleNumber = 0;
            }

            if (scheduleNumber > 0) {
                let minSeconds = 60;
                let maxSeconds = 60 * 60 * 24 * 365;

                let scheduleSeconds = scheduleNumber;
                switch (scheduleUnit) {
                    case "days":
                        scheduleSeconds *= 24 * 60 * 60;
                        break;
                    case "hours":
                        scheduleSeconds *= 60 * 60;
                        break;
                    case "minutes":
                        scheduleSeconds *= 60;
                        break;
                }
                
                if (scheduleSeconds < minSeconds) {
                    addInvalid(errors, `Не чаще, чем раз в ${minSeconds} секунд`, scheduleNumberField);
                    scheduleNumber = 0;
                } else if (scheduleSeconds > maxSeconds) {
                    addInvalid(errors, `Не реже, чем раз в год`, scheduleNumberField);
                    scheduleNumber = 0;
                } else if (!scheduleNumberField.checkValidity()) {
                    addInvalid(errors, "Укажите корректное число", scheduleNumberField);
                    scheduleNumber = 0;
                } else {
                    removeInvalid(scheduleNumberField);
                }
            }

            if (!["days","hours","minutes","seconds"].includes(scheduleUnit)) {
                addInvalid(errors, getKeyPhrase("unit_wrong"), scheduleUnitField);
                scheduleUnit = "";
            } else removeInvalid(scheduleUnitField);

            removeInvalid(scheduleTimeField);
            if (scheduleUnit == "days") {
                if (scheduleTime.length < 5 || scheduleTime.length > 8 || ![1,2].includes(count(scheduleTime, ":"))) {
                    addInvalid(errors, getKeyPhrase("time_incorrect"), scheduleTimeField);
                    scheduleUnit = "";
                }
            }

            if (scheduleNumber && scheduleUnit) {
                schedule.push({
                    "schedule_number": scheduleNumber,
                    "schedule_unit": scheduleUnit,
                    "schedule_time": scheduleTime
                })
            }
        }
    }

    updateSettings();

    let spreadsheets = [];
    let allSpreadsheets = settingsForm.querySelectorAll(".spreadsheet");
    for (let i = 0; i < allSpreadsheets.length; i++) {
        let credentialsField = allSpreadsheets[i].querySelector(`[name="spreadsheet_credentials"]`);
        let credentialsButton = allSpreadsheets[i].querySelector(`[name="spreadsheet_askopenfilename"]`);
        let spreadsheetField = allSpreadsheets[i].querySelector(`[name="spreadsheet_id"]`);
        let createButton = allSpreadsheets[i].querySelector(`[name="spreadsheet_create"]`);

        if (credentialsField && spreadsheetField) {
            let credentialsFilename = getValue(values, "spreadsheet_credentials", i);
            let spreadsheetId = getValue(values, "spreadsheet_id", i);

            if (!credentialsFilename) {
                let status = findStatusButton(credentialsButton);

                if (status) {
                    if (status.dataset.error) addInvalid(errors, status.dataset.error, credentialsButton);
                    else addInvalid(errors, getKeyPhrase("credentials_required"), credentialsButton);
                } else addInvalid(errors, getKeyPhrase("credentials_required"), credentialsButton);
            } else {
                removeInvalid(credentialsButton);

                if (!spreadsheetId) {
                    addInvalid(errors, getKeyPhrase("not_created"), createButton);
                } else removeInvalid(createButton);
            }

            if (credentialsFilename && spreadsheetId) {
                removeInvalid(credentialsButton);
                spreadsheets.push({
                    "spreadsheet_credentials": credentialsFilename,
                    "spreadsheet_id": spreadsheetId
                })
            }
        }
    }

    let checkOnlyMailErrors = function (errors) {
        let mailKeys = ["check_failed", "check_processing", "password_wrong", "check_wrong"];
        let mailErrors = [];
        
        for (let key of mailKeys) {
            mailErrors.push(getKeyPhrase(key));
        }
        
        for (let err of errors) {
            if (!mailErrors.includes(err[0])) return false;
        }

        return true;
    };

    if (errors.length > 0) {
        // console.log("errors!");
        setStatus(settingsSubmit, "failed");
        showErrors(errors);
        updateCreateButton();
        
        if (checkOnlyMailErrors(errors)) {
            // console.log("OnlyMailErrors!");
            updateMail();
            check();
            settingsSubmit.disabled = false;
            settingsSubmit.classList.remove("notext");
            settingsSubmit.classList.remove("status");
            settingsSubmit.classList.remove("loader");
            settingsSubmit.classList.remove("failed");
            settingsSubmit.classList.remove("checked");
        }
    } else if (mailChecking) {
        // console.log("waiting for mail to check!");
        updateMail();
        check();
    } else {
        // console.log("valid!");
        let processResult = function (result) {
            settingsSubmit.classList.remove("loader");
            
            if (result == null) {
                setStatus(settingsSubmit, "failed");
                let errorText = getKeyPhrase("save_failed");
                headerTip.classList.add("error");
                headerTip.dataset.error = errorText;
                headerContent.classList.remove("hide");
                settingsForm.classList.remove("submit");
                showErrors([[errorText, null]]);
                settingsSubmit.classList.remove("notext");
                settingsSubmit.classList.remove("status");
                settingsSubmit.classList.remove("loader");
                settingsSubmit.classList.remove("failed");
                settingsSubmit.classList.remove("checked");
            } else if (result.success) {
                setStatus(settingsSubmit, "checked");
                settingsForm.classList.remove("submit");
                headerContent.classList.add("hide");
                openSync();
            } else {
                setStatus(settingsSubmit, "failed");
                showErrors(result.error);
            }
        };

        let index = saveSettings({
            "settings": {
                mails: mails,
                triggers: triggers,
                schedule: schedule,
                spreadsheets: spreadsheets
            }
        });

        wait(index, processResult, 10000);
    }    
};

let initSettings = function (settingsForm) {
    if (!settingsForm) return;
    let settingsSubmit = settingsForm.querySelector("#settings_submit");
    let headerContent = settingsForm.querySelector("#settings .content");

    if (headerContent) headerContent.classList.add("hide");

    if (settingsSubmit) {

            field.scrollIntoView();

            let selector = ".spoiler:not(.invisible)";
            let parent = findParentWithChild(field, selector);
            if (parent) {

                if (spoiler) spoiler.checked = true;
            }

            setListeners(settingsForm);
        });
    } else console.error("SETTINGS: Нет кнопки сохранения настроек");

    let triggerCreate = settingsForm.querySelector(`#trigger_create`);
    triggerCreate.addEventListener("click", function () {
        setTimeout(() => {
            updateCreateButton();
        }, 200);
    });

    // TODO: Перенести в update после появления дополнительных таблиц
    let createButton = settingsForm.querySelector("#spreadsheet_creating");
    let openButton = settingsForm.querySelector("#spreadsheet");

    if (credentialsField && credentialsButton) {

        });

        credentialsField.addEventListener("change", function () {
            credentialsChanged();
        });

        credentialsButton.addEventListener("click", function () {
            askOpenFilename();
        });
    }

    let openSettingsSpreadsheet = function () {
        let spreadsheetId = spreadsheetField.value;
        if (spreadsheetId) openSpreadsheet({
            "spreadsheet_id": spreadsheetId
        });
    };

    let createSettingsSpreadsheet = function () {
        let credentialsField = document.querySelector(`[name="spreadsheet_credentials"]`);
        if (!credentialsField.value) return addInvalid([], getKeyPhrase("credentials_required"), credentialsField);

        let grantButton = document.querySelector(`[name="spreadsheet_grant"]`);
        if (grantButton) grantButton.disabled = true;

        let createButton = document.querySelector(`[name="spreadsheet_create"]`);
        let statusId = null;
        if (createButton) {
            statusId = findStatusButton(createButton);
            createButton.disabled = true;
            if (statusId) setStatus(statusId, "loader");
        }

        let processResult = function (result) {
            // console.log("created:", result);
            if (createButton) createButton.disabled = false;
            settingsSubmit.disabled = false;

            if (result == null) {
                let errorText = getKeyPhrase("not_created");

                if (statusId) {
                    setStatus(statusId, "failed");
                    statusId.dataset.error = errorText;
                }

                addInvalid([], errorText, createButton);
            } else if (result.success) {
                if (statusId) setStatus(statusId, "checked");
                spreadsheetField.value = result["spreadsheet_id"];
                if (createButton) removeInvalid(createButton);

                if (grantButton) grantButton.disabled = false;
            } else {
                spreadsheetField.value = "";
                addInvalid([], result.error, createButton);
            }
            spreadsheetIdChanged();
        };
        
        let triggerSheetField = document.querySelector(`.trigger:not(.template) [name="trigger_sheet"]`);
        if (!checkTriggerSheet()) return;

        let index = createSpreadsheet({
            "filename": credentialsField.value,
            "sheet_title": triggerSheetField.value
        });
        wait(index, processResult, 10000);
    };

    if (spreadsheetField) {
        spreadsheetField.addEventListener("change", function () {
            spreadsheetIdChanged();
        });

        spreadsheetField.addEventListener("input", function () {
            spreadsheetIdChanged();
        });
    }

    if (createButton) {
        createButton.addEventListener("click", function () {
            createSettingsSpreadsheet();
        });
    }

    if (openButton) {
        openButton.addEventListener("click", function () {
            openSettingsSpreadsheet();
        });
    }

    if (grantButton && grantField) {
        let grantStatus = findStatusButton(grantButton);
        if (grantStatus) {
            grantStatus.classList.add("ignore_status");
            grantStatus.classList.add("translate_up");
        }

        let grant = function () {
            grantChanged();
            if (grantButton.disabled) return;

            grantButton.disabled = false;
            setStatus(grantStatus, "loader");

            let processResult = function (result) {
                grantButton.disabled = false;

                if (result == null) {
                    grantStatus.dataset.error = getKeyPhrase("grant_failed");
                } else if (result.success) {
                    setStatus(grantStatus, "checked");
                } else {
                    setStatus(grantStatus, "failed");
                    grantStatus.dataset.error = result.error;
                }
            };
            
            let index = grantAccess({
                "gmail": grantField.value,
                "filename": credentialsField.value,
                "spreadsheet_id": spreadsheetField.value
            });
            wait(index, processResult, Infinity);
        };

        grantField.addEventListener("change", function () {
            grantChanged();
        });

        grantField.addEventListener("input", function () {
            grantChanged();
        });

        grantButton.addEventListener("click", function () {
            grant();
        });

        let firstFocus = settingsForm.querySelector("#before_settings");
        let lastFocus = settingsForm.querySelector("#after_settings");
    
        if (firstFocus && openSettingsButton) {
            firstFocus.classList.add("hide");
            firstFocus.addEventListener("focus", function(e){
                if (FOCUS_ENABLED) openSettingsButton.focus();
            }, true )
        }
    
        if (lastFocus && syncLoader) {
            lastFocus.classList.add("hide");
            lastFocus.onfocus = function () {
                if (FOCUS_ENABLED) syncLoader.focus();
            };
        }
    }

    // TODO: Перенести в update после появления дополнительных почт
    let mailServerField = settingsForm.querySelector(`[name="mail_server"]`);
    let mailAddressField = settingsForm.querySelector(`[name="mail_address"]`);
    let mailPasswordField = settingsForm.querySelector(`[name="mail_password"]`);

    if (mailServerField && mailAddressField && mailPasswordField) {
        for (let elem of [mailAddressField, mailPasswordField]) {
            elem.addEventListener("change", function () {
                // console.log("  changed!", elem);
                check();
            });

            elem.addEventListener("input", function () {
                // console.log("  input!", elem);
                check();
            });
        }
    }

    settingsForm.onsubmit = function (event) {
        try { event.preventDefault(); } catch {}
        // console.log("onsubmit => settingsForm");
        submitSettings(settingsForm);
    };

    updateSettings();
    updateTrigger();
};

let parseDate = function (date, isGenitive = false, shortForm = false, removeMilliseconds = true, maxUnits = 2) {
    let diff = new Date() - Date.parse(date);
    if (diff < 0) diff *= -1;

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); // Исправлено
    let seconds = Math.floor((diff % (1000 * 60)) / 1000);
    let milliseconds = diff % 1000;

    let pluralize = function (number, words, isGenitive = false) {
        if (isGenitive) {
            // Родительный падеж
            if (number % 10 === 1 && number % 100 !== 11) {
                return words[3]; // "минуту", "секунду" и т.д.
            } else if ([2, 3, 4].includes(number % 10) && ![12, 13, 14].includes(number % 100)) {
                return words[1]; // "минуты", "секунды" и т.д.
            } else {
                return words[2]; // "минут", "секунд" и т.д.
            }
        } else {
            // Именительный падеж
            if (number % 10 === 1 && number % 100 !== 11) {
                return words[0]; // "минута", "секунда" и т.д.
            } else if ([2, 3, 4].includes(number % 10) && ![12, 13, 14].includes(number % 100)) {
                return words[1]; // "минуты", "секунды" и т.д.
            } else {
                return words[2]; // "минут", "секунд" и т.д.
            }
        }
    };

    // Словари для полной и сокращённой формы
    const daysWords = shortForm ? ["дн", "дн", "дн", "дн"] : ["день", "дня", "дней", "дня"];
    const hoursWords = shortForm ? ["ч", "ч", "ч", "ч"] : ["час", "часа", "часов", "часа"];
    const minutesWords = shortForm ? ["мин", "мин", "мин", "мин"] : ["минута", "минуты", "минут", "минуту"];
    const secondsWords = shortForm ? ["сек", "сек", "сек", "сек"] : ["секунда", "секунды", "секунд", "секунду"];
    const millisecondsWords = shortForm ? ["мс", "мс", "мс", "мс"] : ["миллисекунда", "миллисекунды", "миллисекунд", "миллисекунду"];

    let result = [];

    if (days > 0 && maxUnits > 0) {
        result.push(`${days} ${pluralize(days, daysWords, isGenitive)}`);
        maxUnits--;
    }
    if (hours > 0 && maxUnits > 0) {
        result.push(`${hours} ${pluralize(hours, hoursWords, isGenitive)}`);
        maxUnits--;
    }
    if (minutes > 0 && maxUnits > 0) {
        result.push(`${minutes} ${pluralize(minutes, minutesWords, isGenitive)}`);
        maxUnits--;
    }
    if ((seconds > 0 || (diff == 0 && removeMilliseconds)) && maxUnits > 0) {
        result.push(`${seconds} ${pluralize(seconds, secondsWords, isGenitive)}`);
        maxUnits--;
    }
    if ((!removeMilliseconds && milliseconds > 0 || diff == 0) && maxUnits > 0) {
        result.push(`${milliseconds} ${pluralize(milliseconds, millisecondsWords, isGenitive)}`);
        maxUnits--;
    }

    return result.join(" ");
};

let getLastSync = function () {
    let lastSync = Data.gui["last_sync"];
    let missSync = Data.gui["sync_miss"];

    if (lastSync.toLowerCase() == NOSYNC) return getKeyPhrase("last_sync_nosync");
    else if (missSync) {
        let phrase = getKeyPhrase("last_sync_miss");
        if (phrase.includes("${}")) return phrase.replace("${}", parseDate(missSync, true));
        else return phrase + parseDate(missSync);
    } else if (lastSync) {
        let phrase = getKeyPhrase("last_sync_was");
        if (phrase.includes("${}")) return phrase.replace("${}", parseDate(lastSync, true));
        else return phrase + parseDate(lastSync);
    } else return getKeyPhrase("last_sync_nosync");
};

let getNextSync = function () {
    if (Data.gui.closing === true) {
        return getKeyPhrase("app_closing");
    }

    let nextSync = Data.gui["next_sync"];
    if (Data.gui["sync_progress"].length > 0)  {
        let syncLoader = document.querySelector("#sync_header");
        if (syncLoader) setStatus(syncLoader, "loader");
        return Data.gui["sync_progress"];
    } else if (Data.gui["sync_error"]) {
        let errorText = Data.gui["sync_error"];
            
        if (errorText.length > 1000) {
            errorText = errorText.slice(0, 1000) + "...";
        }
        
        return errorText;
    } else if (Data.gui["sync_in_progress"]) {
        let syncLoader = document.querySelector("#sync_header");
        if (syncLoader) setStatus(syncLoader, "loader");
        return getKeyPhrase("next_sync_in_progress");
    } else if (Data.gui["sync_finished"]) return getKeyPhrase("next_sync_finished");
    else if (nextSync.toLowerCase() == MANUAL) return getKeyPhrase("next_sync_manual");
    else if (nextSync.toLowerCase() != IN_PROGRESS && nextSync.length > 0 && nextSync.includes(":")) return getKeyPhrase("next_sync_will") + parseDate(nextSync, true);
    else return getKeyPhrase("next_sync_placeholder");
};

    if (!syncForm) return;
    let syncSubmit = syncForm.querySelector("#sync_submit");
    let syncLoader = syncForm.querySelector("#sync_header");

    let lastSyncField = syncForm.querySelector(`[data-id="sync_last"] [data-lang-text="sync_last"]`);
    let nextSyncField = syncForm.querySelector(`[data-id="sync_next"] [data-lang-text="sync_next"]`);

    if (Data.gui["sync_finished"]) {
        Data.gui["sync_finished"] = false;
        setSyncFinished(getSyncStatus() == "checked");
    }

    let nextSync = Data.gui["next_sync"];
    let diff = Date.parse(nextSync) - new Date();
    if (diff >= 0 && diff < 1000 && !Data.gui["sync_in_progress"]) setSyncStarted();

    let lastSyncText = getLastSync();
    let nextSyncText = getNextSync();

    if (lastSyncField && lastSyncText) {
        lastSyncField.textContent = lastSyncText;
    }

    if (nextSyncField && nextSyncText) {
        nextSyncField.textContent = nextSyncText;
    }

    if (syncStatus) {
        // if (syncSubmit) syncSubmit.disabled = Data.gui["sync_in_progress"];

    }

    if (grantButton && grantField) {
        let error = "";
        let gmail = grantField.value;

        if (createButton && createButton.disabled && statusId) error = statusId.dataset.error;
        if (spreadsheetField && spreadsheetField.value == "") error = getKeyPhrase("not_created");
        if (gmail.length < 11) error = getKeyPhrase("grant_required");
        else if (!gmail.endsWith("@gmail.com")) error = getKeyPhrase("grant_incorrect");

        grantButton.disabled = error != "";

        if (grantStatus)  {
            if (grantField.value != "") setStatus(grantStatus, error != "" ? "failed" : "");
            grantStatus.dataset.error = error;
        }
    }
};

let updateSettings = function () {
    let settingsForm = document.querySelector("form#settings");

    if (Data.gui.closing) {
        if (settingsForm) {
            let settingsHeader = settingsForm.querySelector(`[data-lang-text="settings_submit"]`) || settingsForm.querySelector(`[data-lang-text="welcome"]`);
            if (settingsHeader) {
                settingsHeader.dataset.langText = "app_closing";
                updateLangElement(settingsHeader, "text");
            }

            let settingsSubmit = settingsForm.querySelector("#settings_submit");
            if (settingsSubmit) {
                settingsSubmit.dataset.langText = "force_close";
                updateLangElement(settingsSubmit, "text");
                settingsSubmit.onclick = function () {
                    stop();
                };
            }
        }
    } else if (Data.gui.nodata_done) {
        if (settingsForm) {
            let settingsHeader = settingsForm.querySelector(`[data-lang-text="settings_submit"]`) || settingsForm.querySelector(`[data-lang-text="welcome"]`);
            if (settingsHeader) {
                settingsHeader.dataset.langText = "settings_submit";
                updateLangElement(settingsHeader, "text");
            }

            let settingsSubmit = settingsForm.querySelector("#settings_submit");
            if (settingsSubmit) {
                settingsSubmit.dataset.langText = "settings_save";
                updateLangElement(settingsSubmit, "text");
            }
        }
    }

    check();
    updateCreateButton();
    spreadsheetIdChanged();
    credentialsChanged();
    grantChanged();
    updateStatus(settingsForm);
};

async function update() {
    window.resizable = false;
    let data = {};
    let content = "{}";

    try {
        content = await eel.get_from_python()();
    } catch {
        if (DEBUG_MODE) {
            if (!debugOpened) {
                debugOpened = true;
                open("settings");
                document.querySelector("title").textContent = "Parser 1.4 test";
            }
            
            let settingsSubmit = document.querySelector("#settings_submit");
            if (settingsSubmit) settingsSubmit.onclick = () => {
                open("sync");
            };
        }
        if (Data.gui.connected) return lostConnection();
    }

    Data.gui.connected = true;
    data = JSON.parse(content);
    if (typeof(data) == "string") data = JSON.parse(data);
    if (data["close_window"] === true) {
        stop();
    }
    updateData(data);
    updateSyncButton();

    if (!Data.gui.updated) {
        runPopup();
        loadSync();
        loadSettings();
    }

    let syncForm = document.querySelector("form#sync");
    if (syncForm) updateSync(syncForm);

    let spoiler = document.querySelector("#spreadsheet_granting_spoiler");
    if (spoiler) spoiler.checked = true;

    for (let elem of document.querySelectorAll(".theme")) {
        elem.onclick = function () {
            try { event.preventDefault(); } catch {}
            toggleTheme();
        };
    }

    if (!checkWorking()) {
        if (Data.gui.connected) stop();
    }
    
    if (!Data.gui.updated) {
        if (!DEBUG_MODE) updateGUI();
        updateSettings();
    }
    Data.gui.updated = true;

    if (Data.gui.nodata === true) {
        if (!Data.gui.nodata_done) {
            Data.gui.nodata_done = true;
            let settingsForm = document.querySelector("form#settings");

            if (settingsForm) {
                let settingsHeader = settingsForm.querySelector(`[data-lang-text="settings_submit"]`);
                if (settingsHeader) settingsHeader.dataset.langText = "welcome";

                let settingsSubmit = settingsForm.querySelector("#settings_submit");
                if (settingsSubmit) settingsSubmit.dataset.langText = "first_start";
            }
        }
    }
};

let stop = function () {
    // FIXME: uncomment!
    // if (!DEBUG_MODE) {
    showClosing();
    window.close();
    // }
};

let start = function () {
    let syncForm = document.querySelector("form#sync");
    if (syncForm) initSync(syncForm);

    let settingsForm = document.querySelector("form#settings");

    if (settingsForm) {
        initSettings(settingsForm);

        for (let elem of settingsForm.querySelectorAll(".spoiler")) {
            elem.onchange = function () {
                saveSpoilers(settingsForm);
            };
        }
    }

    setTimeout(() => {
        let submitButton = document.querySelector(`.menu:not(.hide) button[type="submit"]`);
        if (submitButton && FOCUS_ENABLED) submitButton.focus();
    }, 1000);

    // updateMenu();
};

let run = function () {
    let syncSubmit = document.querySelector("#sync_submit");
    let settingsSubmit = document.querySelector("#settings_submit");

    if (syncSubmit && settingsSubmit && !Data.gui.started) {
        Data.gui.started = true;
        start();
	}
};

let watchdog = function () {
    let diff = new Date() - Data.gui.last_updated;

    if (diff > 1500) {
        Data.gui.lost++;

        if (false && Data.gui.connected) {
            let errorText = getKeyPhrase("app_closing");

            let nextSyncField = document.querySelector(`[data-id="sync_next"] [data-lang-text="sync_next"]`);
            if (nextSyncField) nextSyncField.textContent = errorText;

            let syncLoader = document.querySelector("#sync_header");
            if (syncLoader) {
                syncLoader.classList.add("loader");
                syncLoader.classList.remove("failed");
                syncLoader.classList.remove("checked");
            }

            let settingsForm = document.querySelector("form#settings");
            if (settingsForm) {
                let headerContent = settingsForm.querySelector(".content");
                let headerTip = settingsForm.querySelector(".tip");

                if (headerTip) {
                    headerTip.classList.add("error");
                    headerTip.textContent = errorText;
                }
                if (headerContent) headerContent.classList.remove("hide");

                let settingsSubmit = document.querySelector("#settings_submit");
                if (settingsSubmit) {
                    settingsSubmit.classList.add("notext");
                    settingsSubmit.classList.add("status");
                    settingsSubmit.classList.add("loader");
                    settingsSubmit.classList.remove("failed");
                    settingsSubmit.classList.remove("checked");
                }
            }
        }
    }

    if (Data.gui.lost > 2) {
        let errorText = getKeyPhrase("app_lost");

        if (false && Data.gui.connected) {
            let nextSyncField = document.querySelector(`[data-id="sync_next"] [data-lang-text="sync_next"]`);
            if (nextSyncField) nextSyncField.textContent = errorText;

            let syncLoader = document.querySelector("#sync_header");
            if (syncLoader) {
                syncLoader.classList.add("failed");
                syncLoader.classList.remove("checked");
                syncLoader.classList.remove("loader");
            }

            let settingsForm = document.querySelector("form#settings");
            if (settingsForm) {
                let headerContent = settingsForm.querySelector(".content");
                let headerTip = settingsForm.querySelector(".tip");

                if (headerTip) {
                    headerTip.classList.add("error");
                    headerTip.textContent = errorText;
                }
                if (headerContent) headerContent.classList.remove("hide");

                let settingsSubmit = document.querySelector("#settings_submit");
                if (settingsSubmit) {
                    settingsSubmit.classList.add("notext");
                    settingsSubmit.classList.add("status");
                    settingsSubmit.classList.add("failed");
                    settingsSubmit.classList.remove("loader");
                    settingsSubmit.classList.remove("checked");
                }
            }
        }

        lostConnection();
    }
};

addInterval(setInterval(() => {
    update();
    run();
}, 1000));

addInterval(setInterval(() => {
    watchdog();
}, 1000));</script>
